name: build

# Builds Windows x64, Linux x64, and macOS arm64 binaries. The stock ROM required for
# RecompiledFuncs regeneration is cloned from a private assets repository via
# the CVLOD_ASSETS_REPO_WITH_PAT secret (a clone URL with an embedded
# fine-grained PAT, e.g. https://x-access-token:TOKEN@github.com/OWNER/cvlod-assets.git).
# The ROM never appears in logs, artifacts, or releases.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - name: Checkout (recursive)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute version string
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') { $v = $env:GITHUB_REF_NAME } else { $v = $env:GITHUB_SHA.Substring(0, 8) }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Fetch ROM from private assets repo
        shell: pwsh
        run: |
          git clone --depth 1 "${{ secrets.CVLOD_ASSETS_REPO_WITH_PAT }}" cvlod-assets
          Copy-Item cvlod-assets\rom.z64 rom.z64
          Remove-Item cvlod-assets -Recurse -Force
          $size = (Get-Item rom.z64).Length
          if ($size -ne 16777216) { throw "rom.z64 has unexpected size $size" }

      - name: Verify ClangCL toolset is available
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $path = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Llvm.Clang -property installationPath
          if (-not $path) { throw "VS Clang components not found on runner image" }
          & "$path\VC\Tools\Llvm\x64\bin\clang-cl.exe" --version

      - name: Export GitHub Actions cache variables for vcpkg
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install vcpkg dependencies
        shell: pwsh
        env:
          VCPKG_BINARY_SOURCES: clear;x-gha,readwrite
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install zlib:x64-windows freetype:x64-windows

      - name: Build N64Recomp CLI (clean pinned submodule)
        shell: pwsh
        run: |
          git -C lib\N64ModernRuntime\N64Recomp diff --quiet -- src/
          cmake -S lib\N64ModernRuntime\N64Recomp -B build-n64recomp -G "Visual Studio 17 2022" -A x64
          cmake --build build-n64recomp --config Release --target N64RecompCLI --parallel

      - name: Regenerate RecompiledFuncs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true
          python tools\ni_ovl\step1_dump_table.py rom.z64
          python tools\ni_ovl\step2_decompress.py rom.z64
          python tools\ni_ovl\step3_boundaries.py
          python tools\ni_ovl\step4_functions.py
          New-Item -ItemType Directory -Force resources | Out-Null
          python tools\ni_ovl\step6_extended_rom.py rom.z64
          # N64Recomp exits non-zero on the known overlay_system message.
          $PSNativeCommandUseErrorActionPreference = $false
          .\build-n64recomp\Release\N64Recomp.exe recomp.toml
          Write-Host "N64Recomp exited $LASTEXITCODE (expected overlay_system abort)"
          $PSNativeCommandUseErrorActionPreference = $true
          python tools\fix_n64recomp_truncation.py
          python tools\ni_ovl\repair_overlay_table.py --fix
          python tools\ni_ovl\fix_undeclared_labels.py
          python tools\apply_patches.py
          python tools\apply_symbols.py
          # Tracked patched files are authoritative.
          git checkout -- RecompiledFuncs/

      - name: Validate regeneration output
        shell: pwsh
        run: |
          if (-not (Test-Path RecompiledFuncs\funcs.h)) { throw "funcs.h missing" }
          if (-not (Test-Path RecompiledFuncs\recomp_overlays.inl)) { throw "recomp_overlays.inl missing" }
          $count = (Get-ChildItem RecompiledFuncs\*.c | Measure-Object).Count
          if ($count -lt 240) { throw "only $count generated .c files (expected ~241)" }
          python tools\ni_ovl\repair_overlay_table.py

      - name: Configure and build LodRecomp (ClangCL)
        shell: pwsh
        run: |
          cmake -S . -B build-win -G "Visual Studio 17 2022" -A x64 -T ClangCL `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build-win --config RelWithDebInfo --target LodRecomp --parallel

      - name: Package
        id: pkg
        shell: pwsh
        run: |
          $v = "${{ steps.ver.outputs.version }}"
          $name = "LodRecomp-$v-windows-x64"
          New-Item -ItemType Directory -Force "stage\$name" | Out-Null
          Copy-Item build-win\RelWithDebInfo\LodRecomp.exe "stage\$name\"
          Copy-Item build-win\RelWithDebInfo\*.dll "stage\$name\"
          Copy-Item .github\release\README-windows.txt "stage\$name\README.txt"
          Compress-Archive -Path "stage\$name" -DestinationPath "$name.zip" -CompressionLevel Optimal
          $h = (Get-FileHash "$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$h  $name.zip" | Out-File "$name.zip.sha256" -Encoding ascii
          Get-Content "$name.zip.sha256"
          "asset=$name.zip" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256

  build-linux:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout (recursive)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute version string
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then v="$GITHUB_REF_NAME"; else v="${GITHUB_SHA:0:8}"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config python3 clang lld \
            libsdl2-dev libfreetype-dev zlib1g-dev libvulkan-dev libgtk-3-dev \
            libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxinerama-dev

      - name: Fetch ROM from private assets repo
        run: |
          git clone --depth 1 "${{ secrets.CVLOD_ASSETS_REPO_WITH_PAT }}" cvlod-assets
          cp cvlod-assets/rom.z64 rom.z64
          rm -rf cvlod-assets
          size=$(stat -c%s rom.z64)
          [ "$size" -eq 16777216 ] || { echo "rom.z64 has unexpected size $size"; exit 1; }

      - name: Build N64Recomp CLI (clean pinned submodule)
        run: |
          git -C lib/N64ModernRuntime/N64Recomp diff --quiet -- src/
          cmake -S lib/N64ModernRuntime/N64Recomp -B build-n64recomp -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-n64recomp --target N64RecompCLI --parallel

      - name: Regenerate RecompiledFuncs
        run: |
          python3 tools/ni_ovl/step1_dump_table.py rom.z64
          python3 tools/ni_ovl/step2_decompress.py rom.z64
          python3 tools/ni_ovl/step3_boundaries.py
          python3 tools/ni_ovl/step4_functions.py
          mkdir -p resources
          python3 tools/ni_ovl/step6_extended_rom.py rom.z64
          # N64Recomp exits non-zero on the known overlay_system message.
          ./build-n64recomp/N64Recomp recomp.toml || echo "N64Recomp exited $? (expected overlay_system abort)"
          python3 tools/fix_n64recomp_truncation.py
          python3 tools/ni_ovl/repair_overlay_table.py --fix
          python3 tools/ni_ovl/fix_undeclared_labels.py
          python3 tools/apply_patches.py
          python3 tools/apply_symbols.py
          # Tracked patched files are authoritative.
          git checkout -- RecompiledFuncs/

      - name: Validate regeneration output
        run: |
          test -f RecompiledFuncs/funcs.h
          test -f RecompiledFuncs/recomp_overlays.inl
          count=$(ls RecompiledFuncs/*.c | wc -l | tr -d ' ')
          [ "$count" -ge 240 ] || { echo "only $count generated .c files (expected ~241)"; exit 1; }
          python3 tools/ni_ovl/repair_overlay_table.py

      - name: Configure and build LodRecomp (Clang)
        run: |
          CC=clang CXX=clang++ cmake -S . -B build-linux -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-linux --target LodRecomp --parallel

      - name: Package
        id: pkg
        run: |
          v="${{ steps.ver.outputs.version }}"
          name="LodRecomp-$v-linux-x64"
          mkdir -p "stage/$name"
          cp build-linux/LodRecomp "stage/$name/"
          cp .github/release/README-linux.txt "stage/$name/README.txt"
          cp .github/release/lodrecomp.desktop "stage/$name/LodRecomp.desktop"
          cp "assets/lod_icon-iOS-Default-1024x1024@1x.png" "stage/$name/lodrecomp.png"
          mkdir -p "stage/$name/share/applications" "stage/$name/share/icons/hicolor/1024x1024/apps"
          cp .github/release/lodrecomp.desktop "stage/$name/share/applications/lodrecomp.desktop"
          cp "assets/lod_icon-iOS-Default-1024x1024@1x.png" "stage/$name/share/icons/hicolor/1024x1024/apps/lodrecomp.png"
          tar -czf "$name.tar.gz" -C stage "$name"
          sha256sum "$name.tar.gz" > "$name.tar.gz.sha256"
          cat "$name.tar.gz.sha256"
          echo "asset=$name.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256

  build-macos:
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - name: Checkout (recursive)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Compute version string
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then v="$GITHUB_REF_NAME"; else v="${GITHUB_SHA:0:8}"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: brew install ninja sdl2 freetype

      - name: Fetch ROM from private assets repo
        run: |
          git clone --depth 1 "${{ secrets.CVLOD_ASSETS_REPO_WITH_PAT }}" cvlod-assets
          cp cvlod-assets/rom.z64 rom.z64
          rm -rf cvlod-assets
          size=$(stat -f%z rom.z64)
          [ "$size" -eq 16777216 ] || { echo "rom.z64 has unexpected size $size"; exit 1; }

      - name: Build N64Recomp CLI (clean pinned submodule)
        run: |
          git -C lib/N64ModernRuntime/N64Recomp diff --quiet -- src/
          cmake -S lib/N64ModernRuntime/N64Recomp -B build-n64recomp -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build-n64recomp --target N64RecompCLI --parallel

      - name: Regenerate RecompiledFuncs
        run: |
          python3 tools/ni_ovl/step1_dump_table.py rom.z64
          python3 tools/ni_ovl/step2_decompress.py rom.z64
          python3 tools/ni_ovl/step3_boundaries.py
          python3 tools/ni_ovl/step4_functions.py
          mkdir -p resources
          python3 tools/ni_ovl/step6_extended_rom.py rom.z64
          # N64Recomp exits non-zero on the known overlay_system message.
          ./build-n64recomp/N64Recomp recomp.toml || echo "N64Recomp exited $? (expected overlay_system abort)"
          python3 tools/fix_n64recomp_truncation.py
          python3 tools/ni_ovl/repair_overlay_table.py --fix
          python3 tools/ni_ovl/fix_undeclared_labels.py
          python3 tools/apply_patches.py
          python3 tools/apply_symbols.py
          # Tracked patched files are authoritative.
          git checkout -- RecompiledFuncs/

      - name: Validate regeneration output
        run: |
          test -f RecompiledFuncs/funcs.h
          test -f RecompiledFuncs/recomp_overlays.inl
          count=$(ls RecompiledFuncs/*.c | wc -l | tr -d ' ')
          [ "$count" -ge 240 ] || { echo "only $count generated .c files (expected ~241)"; exit 1; }
          python3 tools/ni_ovl/repair_overlay_table.py

      - name: Configure and build LodRecomp
        run: |
          chmod +x .github/macos/ld64
          cmake -S . -B build-macos -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build-macos --target LodRecomp --parallel

      - name: Package
        id: pkg
        run: |
          v="${{ steps.ver.outputs.version }}"
          name="LodRecomp-$v-macos-arm64"
          bash .github/macos/make_app.sh build-macos/LodRecomp "$v" .
          zip -r -y "$name.zip" LodRecomp.app
          shasum -a 256 "$name.zip" > "$name.zip.sha256"
          cat "$name.zip.sha256"
          echo "asset=$name.zip" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.sha256
