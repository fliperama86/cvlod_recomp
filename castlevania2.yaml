  # Common segment trailing data (structured data, asset offset tables, animation data)
  - name: common_data
    type: bin
    start: 0x10D000

  # Data/asset region between common_data and overlay code.
  # Contains structured data, possibly DMA file table entries.
  - name: asset_data
    type: bin
    start: 0x140000

  # Overlay 0 — "system" overlay, always resident(?).
  # VRAM ~0x801CAEA0 (approximate, based on jal cross-reference).
  # Contains .text, .data, .rodata sections.
  - name: overlay_system
    type: code
    start: 0x745230
    vram: 0x801CAEA0
    subsegments:
      - [0x745230, asm]
      - [0x745510, asm]
      - [0x746380, asm]
      - [0x74A200, asm]
      - [0x74AB20, asm]
      - [0x74B130, asm]

  # Overlay 0 trailing data (.data + .rodata)
  - name: overlay_system_data
    type: bin
    start: 0x74CD10

  # Map/stage overlays — 47 overlays sharing VRAM 0x802E3B70.
  # Overlay table at ROM 0x0B39E8. Each overlay loaded via DMA at runtime.
  # Similar to cv64's exclusive_ram_id: ovl_map_objects pattern.
  - name: map_ovl_00
    type: code
    start: 0x76CD00
    vram: 0x802E3B70
    exclusive_ram_id: map_overlays
    subsegments:
      - [0x76CD00, asm]

  - name: map_ovl_01
