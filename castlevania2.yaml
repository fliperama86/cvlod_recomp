  # Main segment data/rodata (pointer tables, float constants, jump tables, strings)
  - name: main_data
    type: bin
    start: 0xAB9F0

  # "Common" code segment — NOT contiguous with main VRAM.
  # Contains game logic code (effects, enemies, player, stage systems).
  # VRAM 0x80141870 determined by brute-force jal cross-reference analysis.
  # The 0x8014xxxx–0x8018xxxx "undefined" functions from main code are HERE.
  - name: common
    type: code
    start: 0xC2120
    vram: 0x80141870
    subsegments:
      - [0xC2120, asm]
      - [0xC2DE0, asm]
