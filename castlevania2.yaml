name: Castlevania2 (North America)
sha1: 879ead98f197fd05edda867655da5b1ce25aa5b8
options:
  basename: castlevania2
  target_path: resources/castlevania_legacy_of_darkness.z64
  elf_path: build/castlevania2.elf
  base_path: .
  platform: n64
  compiler: IDO

  asm_path: asm

  ld_script_path: config/castlevania2.ld
  ld_dependencies: True

  find_file_boundaries: True
  header_encoding: ASCII

  o_as_suffix: True
  use_legacy_include_asm: False
  mips_abi_float_regs: o32

  symbol_addrs_path:
    - symbols/symbol_addrs.txt
  reloc_addrs_path:
    - symbols/reloc_addrs.txt

  undefined_funcs_auto_path: symbols/undefined_funcs_auto.txt
  undefined_syms_auto_path: symbols/undefined_syms_auto.txt

  extensions_path: tools/splat_ext
  rodata_string_guesser_level: 2
  data_string_guesser_level: 2
segments:
  - name: header
    type: header
    start: 0x0

  - name: ipl3
    type: bin
    start: 0x40

  - name: entry
    type: code
    start: 0x1000
    vram: 0x80000400
    subsegments:
      - [0x1000, hasm]

  - name: main
    type: code
    start: 0x00001060
    vram: 0x80000460
    follows_vram: entry
    bss_size: 0x7DA10
    subsegments:
      - [0x00001060, asm, gamestate]
      - [0x00001370, asm, memory]
      - [0x00002280, asm, object]
      - [0x00003550, asm]               # Matrix operations
      - [0x00004BC0, asm]
