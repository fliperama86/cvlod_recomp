# or incorrect boundaries detected by splat
stubs = [
    # TLB mapping (mfc0/mtc0 EntryHi/Lo, tlbwi) - NOT in recompiler's ignored list
    "func_80017720",
    "func_80097730",
    "func_800A02F0",
    "func_800A4D40",
    # Exception handler / __osEnqueueAndYield - NOT in ignored list (different names)
    "func_80097AB0",
    "func_80097FE4",
    # trunc.l.d / trunc.l.s (MIPS III unsupported by this N64Recomp version)
    "func_800A6C20",
    "func_800A6C3C",
    # Branch to RSP IMEM / multi-register cop0
    "func_800AADA0",
    "func_800AADA8",
    # Boundary issue: branches past common section end
    "func_80176104",
    "func_8018C680",
    # Overlay functions with boundary issues
    "map_ovl_29_func_802E4E9C",
    "map_ovl_29_func_802E534C",
    # Overlay functions with branches to unmapped addresses
    "map_ovl_42_func_802E8A80",
    "map_ovl_42_func_802E8A88",
    "map_ovl_42_func_802E8AAC",
    "map_ovl_42_func_802E8AD0",
    "map_ovl_42_func_802E8AF4",
]

ignored = []
