# N64Recomp config for Castlevania: Legacy of Darkness (ND4E)

[input]
entrypoint = 0x80000400
output_func_path = "RecompiledFuncs"
relocatable_sections_path = "overlays.txt"
symbols_file_path = "castlevania2.syms.toml"
rom_file_path = "resources/castlevania_legacy_of_darkness.z64"

[patches]
